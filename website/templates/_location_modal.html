
<!-- Location Modal Popup -->
<div id="locationModal" class="fixed inset-0 bg-gray-900/40 hidden flex items-end md:items-center justify-center z-[100] backdrop-blur-sm transition-opacity">
    
    <!-- Modal Content Box -->
    <div class="bg-white w-full max-w-md md:rounded-[24px] rounded-t-[28px] rounded-b-none flex flex-col shadow-2xl relative animate-slide-up md:animate-fade-in-down max-h-[90vh] md:max-h-[85vh]">
        
        <!-- Header -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 shrink-0">
            <h2 class="text-[17px] font-bold text-gray-900 flex items-center">
                <i class="ri-map-pin-2-fill text-indigo-500 mr-2"></i> Venue Location
            </h2>
            <button onclick="closeLocationModal()" class="text-gray-800 hover:text-gray-500 transition-colors p-1">
                <i class="ri-close-line text-[22px]"></i>
            </button>
        </div>
        
        <!-- Scrollable Body Data -->
        <div class="p-6 overflow-y-auto pb-6">
            <p id="modal-full-location" class="text-[15px] text-gray-800 leading-relaxed font-medium whitespace-pre-wrap"></p>
        </div>
        
        <!-- Sticky Bottom Footer Action Button -->
        <div class="p-4 border-t border-gray-100 bg-white shrink-0 mt-auto md:rounded-b-[24px] space-y-3">
            
            <div id="modal-map-link-container" class="hidden">
                <a id="modal-map-link" href="#" target="_blank" class="w-full bg-indigo-50 text-indigo-700 font-bold py-3.5 rounded-[12px] hover:bg-indigo-100 transition-colors text-[15px] flex justify-center items-center shadow-sm border border-indigo-100">
                    Open in Google Maps <i class="ri-external-link-line ml-2"></i>
                </a>
            </div>

            <button onclick="closeLocationModal()" class="w-full bg-gray-900 text-white font-medium py-3.5 rounded-[12px] hover:bg-gray-800 transition-colors text-[15px] tracking-wide shadow-sm">
                Close
            </button>
        </div>
    </div>
</div>

<style>
    /* Modal slide-up animation for mobile */
    @keyframes slideUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
    }
    .animate-slide-up {
        animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
</style>

<script>
    function showLocation(btn) {
        // Retrieve data from the clicked button
        const locationText = btn.getAttribute('data-loc');
        const mapUrl = btn.getAttribute('data-map');
        
        // Populate the Modal Text
        document.getElementById('modal-full-location').textContent = locationText;
        
        // Handle Google Maps Link Visibility
        const linkContainer = document.getElementById('modal-map-link-container');
        const link = document.getElementById('modal-map-link');
        
        if (mapUrl && mapUrl !== 'None' && mapUrl.trim() !== '') {
            link.href = mapUrl;
            linkContainer.classList.remove('hidden');
        } else {
            linkContainer.classList.add('hidden');
        }
        
        // Open Modal
        const modal = document.getElementById('locationModal');
        modal.classList.remove('hidden');
        
        // Slight delay to ensure display is block before triggering flex and fade
        setTimeout(() => modal.classList.add('flex'), 10);
        document.body.style.overflow = 'hidden'; // Stop background scroll
    }
    
    function closeLocationModal() {
        const modal = document.getElementById('locationModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        document.body.style.overflow = ''; // Restore background scroll
    }
</script>

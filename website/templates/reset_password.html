
{% extends "base.html" %}
{% block title %}Create New Password - Wandershots{% endblock %}

{% block content %}
<section class="min-h-[90vh] flex items-center justify-center bg-gray-50 px-4 sm:px-6 lg:px-8 py-20">
    <div class="max-w-md w-full space-y-8 bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-gray-100 animate-fade-in-down">
        
        <div class="text-center">
            <h2 class="text-3xl font-light text-primary tracking-tight mb-2">New Password</h2>
            <p class="text-sm text-gray-500 font-light">Your OTP has been verified. You can now create a new secure password.</p>
        </div>

        <form method="POST" action="" class="mt-8 space-y-6">
            <div class="space-y-5">
                <div>
                    <label for="password" class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">New Password</label>
                    <input id="password" name="password" type="password" required minlength="6"
                        class="appearance-none block w-full px-4 py-3.5 border border-gray-200 rounded-xl text-gray-900 bg-gray-50 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all sm:text-sm" 
                        placeholder="••••••••">
                </div>

                <div>
                    <label for="confirm_password" class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Confirm New Password</label>
                    <input id="confirm_password" name="confirm_password" type="password" required minlength="6"
                        class="appearance-none block w-full px-4 py-3.5 border border-gray-200 rounded-xl text-gray-900 bg-gray-50 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all sm:text-sm" 
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="w-full flex justify-center py-4 px-4 border border-transparent text-sm font-bold tracking-widest uppercase rounded-xl text-white bg-green-600 hover:bg-green-700 transition-all shadow-md">
                Update Password
            </button>
        </form>
    </div>
</section>
{% endblock %}

{% extends "base.html" %}
{% block title %}Edit Booking{% endblock %}

{% block content %}
<div class="h-screen bg-gray-50 flex text-gray-800 font-sans overflow-hidden w-full absolute top-0 left-0 z-50">
    
    {% include '_admin_sidebar.html' %}

    <main class="flex-1 p-8 overflow-y-auto bg-gray-50">
        <div class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Update Booking</h1>
                <p class="text-gray-500">Edit the details for {{ booking.customer_name }}'s event.</p>
            </div>
            <a href="{{ url_for('views.booked_bookings') }}" class="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-50 font-medium">
                <i class="ri-arrow-left-line mr-2"></i> Cancel Edit
            </a>
        </div>

        <div class="bg-white p-8 rounded-xl border border-gray-200 shadow-sm max-w-3xl">
            <form method="POST" class="space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Customer Name</label>
                        <input type="text" name="customer_name" value="{{ booking.customer_name }}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Contact Number</label>
                        <input type="text" name="customer_phone" value="{{ booking.customer_phone if booking else '' }}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
                        <input type="email" name="customer_email" value="{{ booking.customer_email }}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Service Type</label>
                        <input type="text" name="service_type" value="{{ booking.service_type }}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Package Selected</label>
                        <input type="text" name="package_selected" value="{{ booking.package_selected or '' }}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Location / Venue</label>
                    <input type="text" name="location" value="{{ booking.location or '' }}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none">
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Date</label>
                        <input type="date" name="date" value="{{ booking.date }}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Time</label>
                        <input type="time" name="time" value="{{ booking.time }}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none" required>
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Notes</label>
                    <textarea name="notes" rows="4" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none">{{ booking.notes or '' }}</textarea>
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition-colors">
                    Save Changes
                </button>
            </form>
        </div>
    </main>
</div>
{% endblock %}

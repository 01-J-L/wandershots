
{% extends "base.html" %}
{% block title %}Forgot Password - Wandershots{% endblock %}

{% block content %}
<section class="min-h-[90vh] flex items-center justify-center bg-gray-50 px-4 sm:px-6 lg:px-8 py-20">
    <div class="max-w-md w-full space-y-8 bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-gray-100 animate-fade-in-down">
        
        <div class="text-center">
            <div class="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="ri-lock-unlock-line text-3xl text-indigo-600"></i>
            </div>
            <h2 class="text-3xl font-light text-primary tracking-tight mb-2">Forgot Password?</h2>
            <p class="text-sm text-gray-500 font-light">Enter your registered email address and we'll send you a 6-digit OTP code to reset it.</p>
        </div>

        <form method="POST" action="" class="mt-8 space-y-6">
            <div>
                <label for="email" class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Email Address</label>
                <input id="email" name="email" type="email" required 
                    class="appearance-none block w-full px-4 py-3.5 border border-gray-200 rounded-xl text-gray-900 bg-gray-50 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all sm:text-sm" 
                    placeholder="you@example.com">
            </div>

            <button type="submit" class="w-full flex justify-center py-4 px-4 border border-transparent text-sm font-bold tracking-widest uppercase rounded-xl text-white btn-primary transition-all shadow-md">
                Send OTP Code
            </button>
            
            <div class="text-center mt-6">
                <a href="{{ url_for('auth.login') }}" class="text-sm font-bold text-gray-400 hover:text-indigo-600 transition-colors">
                    <i class="ri-arrow-left-s-line mr-1"></i> Back to Login
                </a>
            </div>
        </form>
    </div>
</section>
{% endblock %}

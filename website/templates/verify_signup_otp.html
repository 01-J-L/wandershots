
{% extends "base.html" %}
{% block title %}Verify Account - Wandershots{% endblock %}

{% block content %}
<section class="min-h-[90vh] flex items-center justify-center bg-gray-50 px-4 sm:px-6 lg:px-8 py-20">
    <div class="max-w-md w-full space-y-8 bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-gray-100 animate-fade-in-down">
        
        <div class="text-center">
            <div class="w-16 h-16 bg-pink-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="ri-shield-check-line text-3xl text-pink-600"></i>
            </div>
            <h2 class="text-3xl font-light text-primary tracking-tight mb-2">Verify Your Email</h2>
            <p class="text-sm text-gray-500 font-light">We sent a 6-digit verification code to <br><strong class="text-gray-800">{{ email }}</strong></p>
        </div>

        <form method="POST" action="{{ url_for('auth.verify_signup_otp') }}" class="mt-8 space-y-6">
            <div>
                <label for="otp" class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 text-center">Enter 6-Digit Code</label>
                <input id="otp" name="otp" type="text" maxlength="6" pattern="\d{6}" required 
                    class="appearance-none block w-full px-4 py-4 border border-gray-200 rounded-xl text-gray-900 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition-all text-center text-2xl font-mono tracking-[0.5em]" 
                    placeholder="------">
                
                <!-- COUNTDOWN TIMER -->
                <p id="timerText" class="text-xs text-gray-500 text-center mt-3 font-bold">
                    Code expires in: <span id="countdown" class="text-pink-600">10:00</span>
                </p>
            </div>

            <button type="submit" id="verifyBtn" class="w-full flex justify-center py-4 px-4 border border-transparent text-sm font-bold tracking-widest uppercase rounded-xl text-white bg-gray-900 hover:bg-gray-800 transition-all shadow-md">
                Complete Registration
            </button>
            
            <div class="text-center mt-6 flex flex-col space-y-3">
                <!-- RESEND BUTTON (Hidden until timer ends) -->
                <a href="{{ url_for('auth.resend_signup_otp') }}" id="resendBtn" class="hidden text-sm font-bold text-pink-600 hover:text-pink-800 transition-colors bg-pink-50 py-3 rounded-xl border border-pink-100">
                    <i class="ri-refresh-line mr-1"></i> Resend OTP Code
                </a>

                <a href="{{ url_for('auth.signup') }}" class="text-xs font-bold text-gray-400 hover:text-gray-600 transition-colors pt-2">
                    <i class="ri-arrow-left-s-line mr-1"></i> Use a different email
                </a>
            </div>
        </form>
    </div>
</section>

<!-- JAVASCRIPT FOR TIMER -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Expiry timestamp passed from Python
        const expiryTime = {{ expiry_timestamp }} * 1000; 
        const countdownSpan = document.getElementById('countdown');
        const timerText = document.getElementById('timerText');
        const resendBtn = document.getElementById('resendBtn');
        const verifyBtn = document.getElementById('verifyBtn');
        const otpInput = document.getElementById('otp');

        function updateTimer() {
            const now = new Date().getTime();
            const distance = expiryTime - now;

            if (distance <= 0) {
                clearInterval(interval);
                timerText.innerHTML = "<span class='text-red-500'>Code has expired.</span>";
                resendBtn.classList.remove('hidden');
                resendBtn.classList.add('block');
                verifyBtn.disabled = true;
                verifyBtn.classList.add('opacity-50', 'cursor-not-allowed');
                otpInput.disabled = true;
            } else {
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                countdownSpan.innerHTML = minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
            }
        }
        
        updateTimer(); // Initial call
        const interval = setInterval(updateTimer, 1000);
    });
</script>
{% endblock %}

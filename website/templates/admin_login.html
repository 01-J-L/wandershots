{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<style>
    /* Hides the nav and footer if they have specific IDs or tags */
    nav, footer {
        display: none !important;
    }
</style>
<section class="min-h-screen flex items-center justify-center bg-gray-50 px-4 sm:px-6 lg:px-8 relative">

    <div
        class="max-w-md w-full space-y-8 bg-white p-8 md:p-10 rounded-[24px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 animate-fade-in-down z-10">

        <!-- Header & Logo -->
        <div class="text-center">
            <div
                class="mx-auto w-16 h-16 bg-indigo-50 border border-indigo-100 rounded-full flex items-center justify-center mb-6 shadow-sm">
                <div class="relative w-full h-full flex items-center justify-center">
                    <span class="font-serif-monogram text-2xl text-gray-800 absolute right-1/2 translate-x-1">W</span>
                    <span
                        class="font-serif-monogram italic text-xl text-indigo-600 absolute left-1/2 -translate-x-1 mt-1 font-medium">S</span>
                </div>
            </div>

            <h2 class="text-2xl md:text-3xl font-bold text-gray-900 tracking-tight">Admin Portal</h2>
            <p class="mt-2 text-sm text-gray-500 font-medium">Sign in to manage Wandershots Studios</p>
        </div>

        <!-- Login Form -->
        <form method="POST" class="mt-8 space-y-6">
            <div class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-bold text-gray-700 mb-1.5">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="ri-user-3-line text-gray-400 text-lg"></i>
                        </div>
                        <input id="username" name="username" type="text" required
                            class="appearance-none block w-full pl-11 pr-4 py-3.5 border border-gray-200 rounded-xl text-gray-900 bg-gray-50 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white transition-all sm:text-sm"
                            placeholder="Enter your username">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-bold text-gray-700 mb-1.5">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="ri-lock-password-line text-gray-400 text-lg"></i>
                        </div>
                        <input id="password" name="password" type="password" required
                            class="appearance-none block w-full pl-11 pr-4 py-3.5 border border-gray-200 rounded-xl text-gray-900 bg-gray-50 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white transition-all sm:text-sm"
                            placeholder="••••••••">
                    </div>
                </div>

                
            </div>

            <div class="pt-2 space-y-5">
                <button type="submit"
                    class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all shadow-md hover:shadow-lg">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i
                            class="ri-login-circle-line text-indigo-300 group-hover:text-indigo-200 transition-colors text-lg"></i>
                    </span>
                    Access Dashboard
                </button>

                <div class="text-center flex flex-col items-center justify-center gap-4 mt-2">
                    <a href="{{ url_for('views.home') }}"
                        class="inline-flex items-center text-sm font-medium text-gray-400 hover:text-indigo-600 transition-colors">
                        <i class="ri-arrow-left-s-line mr-1"></i> Return to Website
                    </a>

                    <!-- Download App Button -->
                    <button id="installAppBtn" type="button"
                        class="hidden items-center px-5 py-2 border border-gray-200 shadow-sm text-xs font-bold rounded-full text-indigo-700 bg-indigo-50 hover:bg-indigo-100 focus:outline-none transition-all mt-2">
                        <i class="ri-download-cloud-2-line mr-1.5 text-lg"></i> Install Admin App
                    </button>
                </div>
            </div>
        </form>
    </div>
</section>

<!-- PWA Installation Script -->
<script>
    let deferredPrompt;
    const installBtn = document.getElementById('installAppBtn');

    // Check if the app is already installed
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        installBtn.style.display = 'none';
    }

    // Capture the install prompt from the browser
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'inline-flex'; // Show button when browser says it's installable
        installBtn.classList.remove('hidden');
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt(); // Show the native browser install prompt
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.style.display = 'none'; // Hide button if they installed it
            }
            deferredPrompt = null;
        } else {
            // Fallback for iOS devices (Apple doesn't support automatic prompts)
            alert("To install the Admin App on iOS:\n\n1. Tap the 'Share' icon at the bottom of Safari.\n2. Scroll down and select 'Add to Home Screen'.");
        }
    });

    // Hide button automatically if successfully installed
    window.addEventListener('appinstalled', () => {
        installBtn.style.display = 'none';
    });
</script>
{% endblock %}

{% extends "base.html" %}
{% block title %}{{ 'Edit' if item else 'Add' }} Inventory Item{% endblock %}

{% block content %}
<div class="h-screen bg-gray-50 flex text-gray-800 font-sans overflow-hidden w-full absolute top-0 left-0 z-50">
    {% include '_admin_sidebar.html' %}
    <main class="flex-1 p-4 md:p-8 overflow-y-auto">
        <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl border border-gray-200 shadow-sm mt-10">
            <h1 class="text-2xl font-bold text-gray-900 mb-6">{{ 'Edit' if item else 'Add New' }} Inventory Item</h1>
            
            <form method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Item Name</label>
                    <input type="text" name="name" value="{{ item.name if item else '' }}" required class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:border-indigo-500 focus:outline-none bg-gray-50">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Category</label>
                        <select name="category" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:border-indigo-500 focus:outline-none bg-gray-50">
                            <option value="Paper" {% if item and item.category == 'Paper' %}selected{% endif %}>Paper / Sheets</option>
                            <option value="Ink" {% if item and item.category == 'Ink' %}selected{% endif %}>Ink Cartridges</option>
                            <option value="Props" {% if item and item.category == 'Props' %}selected{% endif %}>Props / Costumes</option>
                            <option value="Equipment" {% if item and item.category == 'Equipment' %}selected{% endif %}>Equipment / Cameras</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Unit</label>
                        <input type="text" name="unit" value="{{ item.unit if item else 'pcs' }}" placeholder="pcs, rolls, packs" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:border-indigo-500 focus:outline-none bg-gray-50">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Initial Quantity</label>
                        <input type="number" name="quantity" value="{{ item.quantity if item else '0' }}" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:border-indigo-500 focus:outline-none bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Alert Level (Min Stock)</label>
                        <input type="number" name="min_stock" value="{{ item.min_stock if item else '5' }}" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:border-indigo-500 focus:outline-none bg-gray-50">
                    </div>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="submit" class="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-colors shadow-md">Save Item</button>
                    <a href="{{ url_for('views.admin_inventory') }}" class="flex-1 bg-gray-100 text-gray-700 font-bold py-3 rounded-xl text-center hover:bg-gray-200 transition-colors">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</div>
{% endblock %}



{% extends "base.html" %}
{% block title %}Create Account - Wandershots{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center bg-gray-50 px-4 sm:px-6 lg:px-8 py-20">
    <div class="max-w-md w-full space-y-8 bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-gray-100 animate-fade-in-down">
        
        <div class="text-center">
            <h2 class="text-3xl font-light text-primary tracking-tight mb-2">Create Account</h2>
            <p class="text-sm text-gray-500 font-light">Join us to book your sessions seamlessly</p>
        </div>


        <form method="POST" action="" class="mt-6 space-y-5">
            <div>
                <label for="first_name" class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Full Name</label>
                <input id="first_name" name="first_name" type="text" required 
                    class="block w-full px-4 py-3.5 border border-gray-200 rounded-xl text-gray-900 bg-gray-50 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all sm:text-sm">
            </div>

            <div>
                <label for="email" class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Email Address</label>
                <input id="email" name="email" type="email" required 
                    class="block w-full px-4 py-3.5 border border-gray-200 rounded-xl text-gray-900 bg-gray-50 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all sm:text-sm">
            </div>

            <div>
                <label for="phone" class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Contact Number</label>
                <input id="phone" name="phone" type="tel" required 
                    class="block w-full px-4 py-3.5 border border-gray-200 rounded-xl text-gray-900 bg-gray-50 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all sm:text-sm">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="password" class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Password</label>
                    <input id="password" name="password" type="password" required 
                        class="block w-full px-4 py-3.5 border border-gray-200 rounded-xl text-gray-900 bg-gray-50 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all sm:text-sm">
                </div>
                <div>
                    <label for="confirm_password" class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Confirm</label>
                    <input id="confirm_password" name="confirm_password" type="password" required 
                        class="block w-full px-4 py-3.5 border border-gray-200 rounded-xl text-gray-900 bg-gray-50 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all sm:text-sm">
                </div>
            </div>

            <button type="submit" class="w-full flex justify-center mt-6 py-4 px-4 border border-transparent text-sm font-bold tracking-widest uppercase rounded-xl text-white btn-primary transition-all shadow-md">
                Create Account
            </button>
            
            <div class="text-center mt-6">
                <p class="text-sm text-gray-600">Already have an account? 
                    <a href="{{ url_for('auth.login', next=request.args.get('next', '')) }}" class="font-bold text-primary hover:text-indigo-600 transition-colors">Sign in</a>
                </p>
            </div>
        </form>

        <div class="mt-6 flex items-center justify-between">
            <span class="w-1/5 border-b border-gray-200 lg:w-1/4"></span>
            <span class="text-[10px] text-center text-gray-400 uppercase font-bold tracking-widest">or sign up with email</span>
            <span class="w-1/5 border-b border-gray-200 lg:w-1/4"></span>
        </div>

        <!-- Social Signups -->
        <div class="mt-6 grid grid-cols-2 gap-4">
            <a href="{{ url_for('auth.login_google', next=request.args.get('next', '')) }}" class="w-full flex items-center justify-center px-4 py-3 border border-gray-200 rounded-xl shadow-sm text-sm font-bold text-gray-700 bg-white hover:bg-gray-50 transition-all">
                <i class="ri-google-fill text-red-500 text-xl mr-2"></i> Google
            </a>
            <a href="{{ url_for('auth.login_facebook', next=request.args.get('next', '')) }}" class="w-full flex items-center justify-center px-4 py-3 border border-gray-200 rounded-xl shadow-sm text-sm font-bold text-gray-700 bg-white hover:bg-gray-50 transition-all">
                <i class="ri-facebook-circle-fill text-blue-600 text-xl mr-2"></i> Facebook
            </a>
        </div>

    </div>
</section>
{% endblock %}

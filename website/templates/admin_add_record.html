{% extends "base.html" %}
{% block title %}Add New Booking{% endblock %}

{% block content %}
<div class="h-screen bg-gray-50 flex text-gray-800 font-sans overflow-hidden w-full absolute top-0 left-0 z-50">
    
    {% include '_admin_sidebar.html' %}

    <main class="flex-1 p-8 overflow-y-auto bg-gray-50">
        <div class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Add New Booking</h1>
                <p class="text-gray-500">Manually add a booking for a client.</p>
            </div>
            <a href="{{ url_for('views.dashboard') }}" class="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-50 font-medium">
                <i class="ri-arrow-left-line mr-2"></i> Back to Dashboard
            </a>
        </div>

        <div class="bg-white p-8 rounded-xl border border-gray-200 shadow-sm max-w-3xl">
            <form method="POST" class="space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Customer Name</label>
                        <input type="text" name="customer_name" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Contact Number</label>
                        <input type="text" name="customer_phone" value="{{ booking.customer_phone if booking else '' }}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
                        <input type="email" name="customer_email" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Service Type</label>
                        <select name="service_type" id="service_type" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none" required>
                            <option value="">Select a Service</option>
                            <option value="On-site Studio Booth">On-site Studio Booth</option>
                            <option value="Photobooth">Photobooth</option>
                            <option value="Photoman">Photoman</option>
                            <option value="Events Photography">Events Photography</option>
                            <option value="Studio Photoshoot">Studio Photoshoot</option>
                        </select>
                    </div>
                    <div id="package_selected_container" style="display: none;">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Package Selected</label>
                        <input type="text" name="package_selected" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Location / Venue</label>
                    <input type="text" name="location" id="location_input" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none">
                </div>
                 <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Google Maps Link (Optional)</label>
                    <input type="url" name="map_url" id="map_url_input" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none">
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Date</label>
                        <input type="date" name="date" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Time</label>
                        <input type="time" name="time" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none" required>
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Notes</label>
                    <textarea name="notes" rows="4" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none"></textarea>
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Initial Status</label>
                    <select name="status" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:outline-none">
                        <option value="scheduled">Scheduled</option>
                        <option value="pending">Pending</option>
                        <option value="cancelled">Cancelled</option>
                        <option value="finished">Finished</option>
                    </select>
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition-colors">
                    Add Booking
                </button>
            </form>
        </div>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const serviceTypeSelect = document.getElementById('service_type');
        const packageSelectedContainer = document.getElementById('package_selected_container');
        const locationInput = document.getElementById('location_input');
        const mapUrlInput = document.getElementById('map_url_input');
        
        const locationRequiredServices = ['Photobooth', 'Photoman', 'Events Photography'];

        function toggleFields() {
            const selectedService = serviceTypeSelect.value;

            // Toggle Package Selected field
            if (selectedService === 'Photobooth') {
                packageSelectedContainer.style.display = 'block';
            } else {
                packageSelectedContainer.style.display = 'none';
                packageSelectedContainer.querySelector('input').value = ''; // Clear value
            }

            // Toggle Location fields based on service type
            if (locationRequiredServices.includes(selectedService)) {
                locationInput.required = true;
                locationInput.removeAttribute('disabled');
                mapUrlInput.removeAttribute('disabled');
            } else {
                locationInput.required = false;
                locationInput.value = ''; // Clear value
                mapUrlInput.value = ''; // Clear value
                locationInput.setAttribute('disabled', 'disabled'); // Disable if not needed
                mapUrlInput.setAttribute('disabled', 'disabled'); // Disable if not needed
            }
        }

        serviceTypeSelect.addEventListener('change', toggleFields);

        // Initial call to set states correctly if a default value is present or on page load
        toggleFields();
    });
</script>
{% endblock %}
